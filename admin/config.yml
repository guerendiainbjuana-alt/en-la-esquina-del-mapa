backend:
  name: git-gateway
  branch: main

media_folder: "images"

collections:
  - name: "proyectos"
    label: "Proyectos"
    folder: "_proyectos"
    create: true
    fields:
      - { label: "Título", name: "titulo", widget: "string" }
      - { label: "Categoría", name: "categoria", widget: "select", options: ["ensayito", "ficcion", "collage", "dibujo", "otro"] }
      - { label: "Imagen", name: "imagen", widget: "image", required: false }
      - { label: "Contenido", name: "body", widget: "markdown" }
